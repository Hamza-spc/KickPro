services:
  postgres:
    image: postgres:15-alpine
    container_name: kickpro-postgres
    mem_limit: 512m
    command: postgres -c shared_buffers=128MB -c max_connections=80
    environment:
      POSTGRES_DB: ${DB_NAME:-kickpro}
      POSTGRES_USER: ${DB_USERNAME:-kickpro}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kickpro}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kickpro} -d ${DB_NAME:-kickpro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kickpro-zookeeper
    mem_limit: 384m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kickpro-kafka
    mem_limit: 768m
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kickpro-redis
    mem_limit: 128m
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kickpro-backend
    mem_limit: 1536m
    mem_reservation: 512m
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-kickpro}
      DB_USERNAME: ${DB_USERNAME:-kickpro}
      DB_PASSWORD: ${DB_PASSWORD:-kickpro}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-changeme-generate-with-openssl-rand-hex-32}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AI_SERVICE_URL: http://ai-service:8000
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m -XX:+UseStringDeduplication"
    env_file:
      - .env

  ai-service:
    build:
      context: ./ai-service
    container_name: kickpro-ai-service
    mem_limit: 384m
    ports:
      - "8000:8000"

volumes:
  postgres_data:
