# In-memory database for CI tests — no Docker required
spring.datasource.url=jdbc:h2:mem:kickpro;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Kafka and Redis for unit tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

jwt.secret=test-secret-key-must-be-at-least-32-characters-long
jwt.expiration-ms=86400000
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test
