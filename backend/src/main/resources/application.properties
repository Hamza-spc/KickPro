spring.application.name=backend

server.port=8080

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kickpro}
spring.datasource.username=${DB_USERNAME:kickpro}
spring.datasource.password=${DB_PASSWORD:kickpro}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=kickpro-backend
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT (Phase 1)
jwt.secret=${JWT_SECRET:changeme-generate-with-openssl-rand-hex-32}

# AI Service
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
