name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "sonar-project.properties"
      - "docker-compose.yml"
      - "docker-compose.aws.yml"
      - "scripts/deploy-aws.sh"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "sonar-project.properties"
      - "docker-compose.yml"
      - "docker-compose.aws.yml"
      - "scripts/deploy-aws.sh"

  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests with JaCoCo coverage
        working-directory: backend
        run: ./mvnw test -B

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN not set — skipping SonarCloud scan"
            exit 0
          fi
          ./backend/mvnw -f backend/pom.xml -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}"

      - name: Build Docker image
        working-directory: backend
        run: docker build -t kickpro-backend:ci .

  deploy-aws:
    needs: build-and-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd ~/KickPro
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-aws.sh
            ./scripts/deploy-aws.sh

      - name: Smoke test public API
        env:
          API_BASE_URL: http://${{ secrets.EC2_HOST }}:8080
        run: |
          set -euo pipefail
          echo "Checking ${API_BASE_URL}/api/v1/auth/login"
          for i in $(seq 1 36); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${API_BASE_URL}/api/v1/auth/login" \
              -H "Content-Type: application/json" \
              -d '{}' || true)
            echo "attempt ${i}: HTTP ${code}"
            case "$code" in
              400|401|403|405|415) echo "Smoke test passed"; exit 0 ;;
            esac
            sleep 10
          done
          echo "Smoke test failed — API did not return a healthy auth response"
          exit 1
