<footer class="border-t border-kp-border bg-kp-bg">
  <div class="mx-auto grid max-w-6xl gap-10 px-4 py-14 md:grid-cols-3">
    <div class="space-y-4">
      <img src="assets/fullwordmark_logo.png" alt="KickPro" class="h-auto w-36" />
      <p class="max-w-sm text-sm text-kp-text-secondary">
        Prove Your Game.
      </p>
    </div>

    <div class="grid grid-cols-2 gap-6 text-sm">
      <div class="space-y-2">
        <div class="font-semibold text-kp-text-primary">Links</div>
        <a href="#about" class="block text-kp-text-secondary hover:text-kp-text-primary">About</a>
        <a href="#features" class="block text-kp-text-secondary hover:text-kp-text-primary">Features</a>
        <a href="#pricing" class="block text-kp-text-secondary hover:text-kp-text-primary">Pricing</a>
      </div>
      <div class="space-y-2">
        <div class="font-semibold text-kp-text-primary">Contact</div>
        <a href="mailto:hello@kickpro.app" class="block text-kp-text-secondary hover:text-kp-text-primary">hello&#64;kickpro.app</a>
        <span class="block text-kp-text-secondary">Morocco</span>
      </div>
    </div>

    <div class="space-y-4">
      <div class="font-semibold text-kp-text-primary">Get the app</div>
      <app-store-buttons [compact]="true"></app-store-buttons>
    </div>
  </div>

  <div class="border-t border-kp-border/80">
    <div class="mx-auto flex max-w-6xl flex-col gap-2 px-4 py-6 text-xs text-kp-text-secondary sm:flex-row sm:items-center sm:justify-between">
      <div>© 2026 KickPro. All rights reserved.</div>
      <div class="text-kp-text-secondary">Prove Your Game.</div>
    </div>
  </div>
</footer>
