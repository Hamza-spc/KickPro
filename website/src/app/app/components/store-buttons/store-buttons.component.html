<div
  [class]="
    'flex flex-col gap-3 sm:flex-row ' + (compact ? '' : 'sm:gap-4')
  "
>

    href="#"
    class="group inline-flex items-center justify-center gap-3 rounded-btn border border-kp-border bg-kp-surface/60 px-4 py-3 text-sm font-semibold text-kp-text-primary backdrop-blur transition hover:border-kp-accent/60 hover:shadow-glow-accent"
    [class.px-3]="compact"
    [class.py-2]="compact"
    aria-label="Download on the App Store"
  >
    <svg viewBox="0 0 24 24" class="h-5 w-5 text-kp-text-primary/90" fill="currentColor" aria-hidden="true">

      <span class="block text-[11px] font-medium text-kp-text-secondary">Download on</span>
      <span class="block text-sm font-semibold">App Store</span>
    </span>
  </a>

  <a
    href="#"
    class="group inline-flex items-center justify-center gap-3 rounded-btn border border-kp-border bg-kp-surface/60 px-4 py-3 text-sm font-semibold text-kp-text-primary backdrop-blur transition hover:border-kp-accent/60 hover:shadow-glow-accent"
    [class.px-3]="compact"
    [class.py-2]="compact"
    aria-label="Get it on Google Play"

    <svg viewBox="0 0 24 24" class="h-5 w-5" aria-hidden="true">

    </svg>
    <span class="leading-tight">
      <span class="block text-[11px] font-medium text-kp-text-secondary">Get it on</span>
      <span class="block text-sm font-semibold">Google Play</span>
    </span>
  </a>
