<div
  class="relative overflow-hidden bg-kp-bg"
  appScrollReveal
  #sr="scrollReveal"
  [@reveal]="sr.visible() ? 'visible' : 'hidden'"
>
  <div class="pointer-events-none absolute inset-0 opacity-60">
    <div class="absolute -left-28 -top-24 h-[520px] w-[520px] bg-radial-glow"></div>
    <div class="absolute -right-32 top-10 h-[520px] w-[520px] bg-radial-glow"></div>
  </div>

  <div class="mx-auto grid max-w-6xl items-center gap-14 px-4 py-20 lg:grid-cols-2 lg:gap-10">
    <!-- Left -->
    <div class="relative z-10">
      <div class="inline-flex items-center gap-2 rounded-full border border-kp-border bg-kp-surface/60 px-4 py-2 text-sm font-semibold text-kp-text-primary backdrop-blur">
        <span class="text-base">⚽</span>
        <span>Football Talent Platform</span>
      </div>

      <h1 class="mt-6 text-balance text-4xl font-bold tracking-tight text-kp-text-primary sm:text-5xl">
        Where Moroccan Talent Gets Discovered
      </h1>

      <p class="mt-5 max-w-xl text-pretty text-base leading-relaxed text-kp-text-secondary sm:text-lg">
        Connect with scouts, prove your skills through verified drills, book matches at local venues,
        and get discovered — all in one app.
      </p>

      <div class="mt-8">
        <app-store-buttons></app-store-buttons>
        <p class="mt-3 text-sm text-kp-text-secondary">
          Free to download · Available on iOS &amp; Android
        </p>
      </div>
    </div>

    <!-- Right -->
    <div class="relative z-10">
      <div class="relative mx-auto w-full max-w-[420px]">
        <div class="absolute inset-0 -z-10 rounded-[48px] bg-[radial-gradient(circle_at_50%_35%,rgba(37,99,235,0.35),rgba(37,99,235,0)_65%)] blur-2xl"></div>
        <div class="phone-ground-shadow absolute left-1/2 top-[84%] -z-10 h-10 w-[70%] -translate-x-1/2 rounded-full"></div>

        <img
          [src]="phoneSrc"
          alt="KickPro mobile app preview"
          class="phone-float phone-tilt mx-auto w-[86%] select-none drop-shadow-[0_32px_70px_rgba(0,0,0,0.55)]"
          draggable="false"
        />
      </div>
    </div>
  </div>
</div>
